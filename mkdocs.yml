site_name: EEEA-PY
site_description: 
site_author: Enrique Gómez, Jessica Medina, Juan de Dios Rivas, Victoria Galvan

theme:
  name: material
  palette:
    primary: indigo
    accent: orange
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  locale: en
  palette:
    # Configuración para el modo claro (o cuando el sistema lo prefiera)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Configuración para el modo oscuro (o cuando el sistema lo prefiera)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started:
      - Installation & Setup: getting-started/installation.md
      - Examples Gallery: examples/index.md
      - Scientific Theory: theory/explicit-exploration.md
  - API Reference:
      - Overview: reference/api-overview.md
      - Algorithms:
          - Overview: reference/algorithms/index.md
          - Particle Swarm (PSO): reference/algorithms/pso.md
          - Gray Wolf Optimization (GWO): reference/algorithms/gwo.md
          - Estimation of Multivariate Normal Algorithm (EMNA): reference/algorithms/emna.md
  - Project Info:
      - Changelog: changelog/v0.1.0.md
      - Contributing: developer/CONTRIBUTING.md
      - Contributing tests: developer/tests/index.md
      - Research FAQ: faq/research_faq.md
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js